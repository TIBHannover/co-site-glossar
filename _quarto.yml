project:
  type: book
  output-dir: docs

book:
  title: "Glossar des Projekts Co-Site" 
  subtitle: "Co-Kreation in der Region – Systemisch und innovativ Transfer entwickeln"
  author: ""
  date: now
  date-format: DD. MMMM YYYY, HH:mm:ss
  chapters:
    - imprint.qmd 
    - index.qmd
    - cosite001.ipynb
    - cosite002.ipynb
    - references.qmd 
  repo-url: https://github.com/TIBHannover/co-site-glossar
  repo-actions: [edit]
  downloads: [pdf,docx,epub]
  cover-image: cover/thkoeln_cover.png
  page-footer: 
    center: "[NextGen Books / CPS](https://projects.tib.eu/nextgen-books/)"
    right: "[Impressum](https://projects.tib.eu/nextgen-books/impressum/)"  
    left: "[Datenschutz](https://projects.tib.eu/nextgen-books/datenschutz/)" 

comments:
  hypothesis: false

bibliography: bib/references.bib

format:
  html:
    number-sections: false
    theme: 'lux'
    css: 'css/thkoelnepub.css'
    lang: de
    cover-image: cover/thkoeln_cover.png

  pdf:
    # latex-engine: xelatex
      lang: de
      number-sections: false
      toc: true
      toc-title: "Inhaltsverzeichnis"
      toc-depth: 3
      documentclass: book
      include-in-header: "tex/in-header.tex"
      pagestyle: plain # page numbers
      geometry: # margins
        - top=20mm
        - right=25mm
        - bottom=20mm
        - left=25mm
        - heightrounded
      classoption: openany 
      fontsize: 12pt
      papersize: a4
      template-partials:
        - "tex/_titlepage.tex" 
        - "tex/before-body.tex"
      title-bg-image: "cover/thkoeln_cover.png"
      title-bg-location: "LR" # UL, UR, LR, LL, leave empty for centered
      title-bg-size: 0.30
      title-boxcolor: gray!15!black
      title-boxopacity: 0
      title-boxfontcolor: black
      boxlinks: false
      colorlinks: true 
      linkcolor: thkoelnred
      urlcolor: thkoelnred
      citecolor: thkoelnred
      figures: true
      figure.caption: true
  
  docx: 
    toc: true
    reference-doc: "docx-template/thkoeln_template.docx"
    number-sections: false
    toc-depth: 3

  epub:
    toc: true 
    toc-depth: 3
    number-sections: false
    css: "css/thkoelnepub.css"
    code-overflow: wrap
    epub-fonts: ['./fonts/MyriadPro-*.otf']
    cover-image: cover/cscover.png